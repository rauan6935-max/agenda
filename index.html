<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Agenda Online Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
    background:#0f0f0f;
    color:white;
    font-family:Poppins;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.card{
    background:#181818;
    padding:25px;
    border-radius:20px;
}

label{
    display:block;
    margin-top:12px;
    font-weight:500;
}

input,select{
    width:100%;
    padding:16px;
    margin-top:8px;
    border-radius:12px;
    border:none;
    background:#262626;
    color:white;
    font-size:16px;
}

select{
    font-size:17px;
    padding:18px;
}

button{
    width:100%;
    margin-top:15px;
    padding:18px;
    border:none;
    border-radius:14px;
    background:linear-gradient(45deg,#ff0099,#7a00ff);
    color:white;
    font-weight:700;
    cursor:pointer;
    font-size:16px;
}

.agenda-item{
    background:#242424;
    padding:18px;
    border-radius:15px;
    margin-top:10px;
    font-size:15px;
}

.excluir{
    background:red;
    margin-top:10px;
}

</style>

</head>

<body>

<h1>AGENDA ONLINE STUDIO</h1>

<div class="container">

<!-- FORM -->
<div class="card">

<label>Cliente</label>
<input id="cliente" type="text"/>

<label>Profissional</label>
<select id="profissional">
    <option>Ruan Cabeleireiro</option>
    <option>Josi Manicure</option>
    <option>Rafaela Lash</option>
    <option>Rafaela Designer</option>
    <option>Rafaela Cursos</option>
    <option>Djesilyn Nail Designer</option>
</select>

<label>Procedimento</label>
<input id="procedimento" type="text"/>

<label>Data</label>
<select id="data"></select>

<label>Horário</label>
<select id="horario"></select>

<button onclick="agendar()">AGENDAR</button>

</div>

<!-- LISTA -->
<div class="card">

<h2>Agendamentos</h2>
<div id="lista"></div>

</div>

</div>

<script>

let agendamentos = JSON.parse(localStorage.getItem("agenda")) || [];

/* DATAS */
function gerarDatas(){

    const select = document.getElementById("data");

    let inicio = new Date(2026,4,27); // 27/05/2026
    let fim = new Date(2027,0,31);    // 31/01/2027

    while(inicio <= fim){

        let d = String(inicio.getDate()).padStart(2,'0');
        let m = String(inicio.getMonth()+1).padStart(2,'0');
        let a = inicio.getFullYear();

        let data = `${d}/${m}/${a}`;

        let opt = document.createElement("option");
        opt.value = data;
        opt.innerHTML = data;

        select.appendChild(opt);

        inicio.setDate(inicio.getDate()+1);
    }
}

/* HORÁRIOS 30 EM 30 MIN (09:00 - 19:00) */
function gerarHorarios(){

    const select = document.getElementById("horario");

    for(let h=9; h<=19; h++){

        let minutos = [0,30];

        for(let m of minutos){

            if(h === 19 && m === 30) continue;

            let hora = String(h).padStart(2,'0');
            let min = String(m).padStart(2,'0');

            let t = `${hora}:${min}`;

            let opt = document.createElement("option");
            opt.value = t;
            opt.innerHTML = t;

            select.appendChild(opt);
        }
    }
}

function agendar(){

    const cliente = document.getElementById("cliente").value;
    const profissional = document.getElementById("profissional").value;
    const procedimento = document.getElementById("procedimento").value;
    const data = document.getElementById("data").value;
    const horario = document.getElementById("horario").value;

    if(!cliente || !procedimento){
        alert("Preencha tudo");
        return;
    }

    agendamentos.push({
        cliente,
        profissional,
        procedimento,
        data,
        horario
    });

    localStorage.setItem("agenda", JSON.stringify(agendamentos));

    render();
}

function excluir(i){
    agendamentos.splice(i,1);
    localStorage.setItem("agenda", JSON.stringify(agendamentos));
    render();
}

function render(){

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    agendamentos.forEach((a,i)=>{

        lista.innerHTML += `
        <div class="agenda-item">

            <b>${a.cliente}</b><br>
            Profissional: ${a.profissional}<br>
            Procedimento: ${a.procedimento}<br>
            Data: ${a.data}<br>
            Horário: ${a.horario}<br>

            <button class="excluir" onclick="excluir(${i})">
            EXCLUIR
            </button>

        </div>
        `;
    });
}

gerarDatas();
gerarHorarios();
render();

</script>

</body>
</html>
