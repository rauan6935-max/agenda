<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Agendamentos</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:linear-gradient(135deg,#000,#111);
    color:white;
    padding:20px;
}

h1{
    text-align:center;
    color:#d4af37;
    font-size:32px;
    margin-bottom:20px;
}

.container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

/* RESPONSIVO */
@media(max-width:900px){
    .container{
        grid-template-columns:1fr;
    }
}

.card{
    background:#0d0d0d;
    border:1px solid #d4af37;
    padding:20px;
    border-radius:15px;
}

input,select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #d4af37;
    background:#000;
    color:white;
}

button{
    width:100%;
    margin-top:10px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#d4af37;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

.agenda{
    background:#111;
    border-left:4px solid #d4af37;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
}

.admin-box{
    display:none;
    margin-top:10px;
}

small{
    color:#aaa;
}

</style>
</head>

<body>

<h1>Studio Agendamentos</h1>

<div class="container">

<!-- CLIENTE -->
<div class="card">

<h2 style="color:#d4af37;">Agendar Horário</h2>

<input id="nome" placeholder="Nome">
<input id="telefone" placeholder="Telefone">
<input id="servico" placeholder="Serviço">

<select id="data"></select>
<select id="horario"></select>

<button onclick="agendar()">AGENDAR</button>

</div>

<!-- ADMIN -->
<div class="card">

<h2 style="color:#d4af37;">Painel Admin</h2>

<button onclick="loginAdmin()">Entrar no Painel</button>

<div id="admin" class="admin-box"></div>

</div>

</div>

<script>

let dados = JSON.parse(localStorage.getItem("agendamentos")) || [];

/* LOGIN ADMIN */
function loginAdmin(){
    let senha = prompt("Senha do admin:");
    if(senha === "gold2026"){
        document.getElementById("admin").style.display = "block";
        renderAdmin();
    } else {
        alert("Senha errada");
    }
}

/* DATAS */
function gerarDatas(){
    let select = document.getElementById("data");

    let inicio = new Date();
    let fim = new Date(2027,6,20);

    while(inicio <= fim){

        let d = String(inicio.getDate()).padStart(2,'0');
        let m = String(inicio.getMonth()+1).padStart(2,'0');
        let a = inicio.getFullYear();

        let data = `${d}/${m}/${a}`;

        let opt = document.createElement("option");
        opt.value = data;
        opt.innerHTML = data;

        select.appendChild(opt);

        inicio.setDate(inicio.getDate()+1);
    }
}

/* HORÁRIO 30 EM 30 */
function gerarHorario(){

    let select = document.getElementById("horario");

    for(let h=9; h<=19; h++){
        for(let m of [0,30]){

            if(h===19 && m===30) continue;

            let hora = String(h).padStart(2,'0');
            let min = String(m).padStart(2,'0');

            let t = `${hora}:${min}`;

            let opt = document.createElement("option");
            opt.value = t;
            opt.innerHTML = t;

            select.appendChild(opt);
        }
    }
}

/* AGENDAR */
function agendar(){

    let nome = document.getElementById("nome").value;
    let telefone = document.getElementById("telefone").value;
    let servico = document.getElementById("servico").value;
    let data = document.getElementById("data").value;
    let horario = document.getElementById("horario").value;

    if(!nome || !telefone || !servico){
        alert("Preencha tudo");
        return;
    }

    dados.push({nome,telefone,servico,data,horario});

    localStorage.setItem("agendamentos", JSON.stringify(dados));

    alert("Agendado com sucesso!");
}

/* ADMIN */
function renderAdmin(){

    let div = document.getElementById("admin");
    div.innerHTML = "";

    dados.forEach((a,i)=>{

        div.innerHTML += `
        <div class="agenda">

            <b>${a.nome}</b><br>
            📞 ${a.telefone}<br>
            💈 ${a.servico}<br>
            📅 ${a.data}<br>
            ⏰ ${a.horario}<br>

            <button onclick="excluir(${i})">Excluir</button>
        </div>
        `;
    });
}

function excluir(i){
    dados.splice(i,1);
    localStorage.setItem("agendamentos", JSON.stringify(dados));
    renderAdmin();
}

gerarDatas();
gerarHorario();

</script>

</body>
</html>
